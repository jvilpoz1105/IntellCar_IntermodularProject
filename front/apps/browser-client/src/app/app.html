<main class="flex min-h-screen flex-col items-center justify-center p-6 bg-background text-foreground bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-muted/50 via-background to-background">
	<section id="welcome-card" hlmCard class="w-full max-w-2xl overflow-hidden border-none shadow-2xl bg-card/50 backdrop-blur-xl ring-1 ring-border/50 opacity-0 transform translate-y-8">
		<div class="relative w-full h-64 overflow-hidden">
			<img
				src="https://picsum.photos/id/892/5000/3333"
				alt="Classic Car Landscape"
				class="w-full h-full object-cover transition-transform duration-700 hover:scale-105"
			/>
			<div class="absolute inset-0 bg-gradient-to-t from-card/90 to-transparent"></div>
			<div class="absolute top-4 right-4">
				<span id="dev-badge" hlmBadge variant="secondary" class="backdrop-blur-md bg-secondary/80">
					🚧 En Desarrollo
				</span>
			</div>
		</div>

		<div hlmCardHeader class="pt-8 text-center">
			<h1 hlmCardTitle class="text-4xl font-extrabold tracking-tight lg:text-5xl bg-clip-text text-transparent bg-gradient-to-r from-foreground to-muted-foreground">
				Bienvenido a IntellCar
			</h1>
			<p hlmCardDescription class="mt-4 text-lg italic text-muted-foreground max-w-md mx-auto leading-relaxed">
				"El coche es lo más parecido que crearemos jamás a algo que esté vivo."
				<span class="block mt-2 font-semibold not-italic text-foreground/80">— Sir Frank Williams</span>
			</p>
		</div>

		<div hlmCardContent class="text-center pb-12">
			<p class="mb-8 text-muted-foreground/80 max-w-sm mx-auto">
				Tu nuevo punto de encuentro definitivo para los amantes del motor está cobrando forma.
			</p>
			
			<div class="flex gap-4 justify-center">
				<button hlmBtn size="lg" class="px-8 shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
					Comenzar Ruta
				</button>
				<button hlmBtn variant="outline" size="lg" class="px-8 backdrop-blur-sm border-muted-foreground/20 hover:bg-muted/50">
					Saber Más
				</button>
			</div>
		</div>

		<div hlmCardFooter class="border-t border-border/40 bg-muted/30 px-6 py-4 flex justify-between items-center text-xs text-muted-foreground uppercase tracking-widest">
			<span>Versión 0.0.1 ALPHA</span>
			<span>Est. 2026</span>
		</div>
	</section>
</main>

<router-outlet />
